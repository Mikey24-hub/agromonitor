<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 AGROMONITOR v5.2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: auto; /* ✅ FIX SCROLL */
            min-height: 100vh;
            overflow-x: hidden; /* ✅ Sin scroll horizontal */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            color: #333;
            padding: 20px;
            /* ✅ QUITÉ height: 100vh fijo */
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding-bottom: 50px; /* ✅ Espacio final */
        }

        /* ... TODO EL CSS ANTERIOR IGUAL ... */

        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); /* ✅ Responsive */
            gap: 20px; /* ✅ Menos gap en móvil */
            margin-bottom: 30px;
        }

        .chart-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(248,250,252,0.9));
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px; /* ✅ Menos padding */
            box-shadow: 0 15px 30px rgba(0,0,0,0.08); /* ✅ Sombra más ligera */
            border: 1px solid rgba(255,255,255,0.3);
            height: 300px; /* ✅ Altura fija para charts */
            display: flex;
            flex-direction: column;
        }

        .chart-card h3 {
            margin-bottom: 15px;
            color: #333;
            text-align: center;
            font-size: 1.1em;
            flex-shrink: 0;
        }

        .chart-wrapper {
            flex: 1;
            position: relative;
            height: 220px; /* ✅ Altura fija para canvas */
        }

        /* ✅ Canvas con altura fija */
        #tempChart, #humidityChart, #rainChart {
            max-height: 100% !important;
            height: 220px !important;
        }

        /* ... RESTO CSS IGUAL ... */

        @media (max-width: 768px) {
            body {
                padding: 10px; /* ✅ Menos padding móvil */
            }
            
            .sensors-grid, .charts-container, .status-grid {
                grid-template-columns: 1fr;
                gap: 15px; /* ✅ Menos gap móvil */
            }
            
            .sensor-value {
                font-size: 2.2em; /* ✅ Más pequeño móvil */
            }
            
            .chart-card {
                height: 280px; /* ✅ Más alto en móvil */
            }
            
            .chart-wrapper {
                height: 200px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2em;
            }
            
            .sensor-card {
                padding: 20px; /* ✅ Más compacto */
            }
        }

        /* ✅ FIX Botón CSV */
        .btn {
            padding: 12px 25px; /* ✅ Más pequeño */
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <!-- TODO EL HTML ANTERIOR IGUAL -->
    
    <!-- ✅ CAMBIO en charts: agregar chart-wrapper -->
    <div class="charts-container">
        <div class="chart-card">
            <h3>📈 Temperatura (°C)</h3>
            <div class="chart-wrapper">
                <canvas id="tempChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>💧 Humedad (%)</h3>
            <div class="chart-wrapper">
                <canvas id="humidityChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>🌧️ Precipitación (%)</h3>
            <div class="chart-wrapper">
                <canvas id="rainChart"></canvas>
            </div>
        </div>
    </div>

    <!-- ✅ FIX Botón CSV con target="_blank" -->
    <div class="actions">
        <a href="/csv" class="btn btn-primary" download>💾 Descargar CSV</a>
        <a href="/status" class="btn btn-secondary" target="_blank">📊 Estado del Sistema</a>
    </div>

    <!-- JS IGUAL pero con fix charts -->
    <script>
        let tempChart, humidityChart, rainChart;

        function initCharts() {
            const ctxTemp = document.getElementById('tempChart').getContext('2d');
            tempChart = new Chart(ctxTemp, {
                type: 'line',
                data: { labels: [], datasets: [{ 
                    label: 'Temperatura', 
                    data: [], 
                    borderColor: '#FF6B6B', 
                    tension: 0.4, 
                    fill: true, 
                    backgroundColor: 'rgba(255,107,107,0.1)',
                    borderWidth: 3
                }] },
                options: { 
                    responsive: true,
                    maintainAspectRatio: false, /* ✅ IMPORTANTE */
                    scales: { 
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } } /* ✅ Sin leyenda */
                }
            });

            // ✅ IGUAL para humidityChart y rainChart...
            const ctxHum = document.getElementById('humidityChart').getContext('2d');
            humidityChart = new Chart(ctxHum, {
                type: 'line',
                data: { labels: [], datasets: [{ 
                    label: 'Humedad', 
                    data: [], 
                    borderColor: '#4ECDC4', 
                    tension: 0.4, 
                    fill: true, 
                    backgroundColor: 'rgba(78,205,196,0.1)',
                    borderWidth: 3
                }] },
                options: { 
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        y: { beginAtZero: true, max: 100, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            const ctxRain = document.getElementById('rainChart').getContext('2d');
            rainChart = new Chart(ctxRain, {
                type: 'line',
                data: { labels: [], datasets: [{ 
                    label: 'Precipitación', 
                    data: [], 
                    borderColor: '#45B7D1', 
                    tension: 0.4, 
                    fill: true, 
                    backgroundColor: 'rgba(69,183,209,0.1)',
                    borderWidth: 3
                }] },
                options: { 
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        y: { beginAtZero: true, max: 50, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // ✅ Resto del JS igual...
        async function updateData() {
            // ... código anterior igual
        }

        initCharts();
        updateData();
        setInterval(updateData, 3000);
    </script>
</body>
</html>
